<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>fragments</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fff;
  color: #000;
  font-family: 'Space Grotesk', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.site-header {
  padding: 40px 40px 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  min-height: 280px;
  align-content: start;
  flex-wrap: wrap;
}

.site-title {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.site-subtitle {
  font-size: 16px;
  font-weight: 300;
  color: #666;
  letter-spacing: 0.06em;
  font-family: 'DM Mono', monospace;
}

/* Grid */
.flow { padding: 0 40px 40px; }

.grid-section {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.grid-item { cursor: pointer; }

.grid-item img {
  width: 100%;
  display: block;
  transition: opacity 0.3s ease;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}

.grid-item:hover img { opacity: 0.85; }

.grid-item .meta {
  font-size: 16px;
  font-weight: 300;
  color: #777;
  letter-spacing: 0.02em;
  margin-top: 8px;
  padding-bottom: 2px;
  transition: color 0.3s ease;
  font-family: 'DM Mono', monospace;
}

.grid-item:hover .meta { color: #444; }

/* === Text block in grid === */
.grid-item.text-block {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 28px 24px;
  min-height: 160px;
  cursor: default;
}

.grid-item.text-block .text-content {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  line-height: 1.65;
  color: #444;
  white-space: pre-line;
}

/* Expanded photo */
.expanded-photo {
  width: 100vw;
  margin-left: -40px;
  margin-top: 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 60px 80px;
  opacity: 0;
  animation: expandIn 0.35s ease forwards;
  position: relative;
}

.close-btn {
  position: absolute;
  top: 24px;
  right: 36px;
  background: none;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 300;
  color: #777;
  cursor: pointer;
  transition: color 0.2s;
  line-height: 1;
  padding: 8px;
  z-index: 10;
}

.close-btn:hover { color: #000; }

.viewer-row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  position: relative;
}

.nav-arrow {
  background: none;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 300;
  color: #777;
  cursor: pointer;
  padding: 24px 20px;
  transition: color 0.2s;
  flex-shrink: 0;
  user-select: none;
  line-height: 1;
}

.nav-arrow:hover { color: #000; }
.nav-arrow:disabled { color: #ccc; cursor: default; }

/* Image stage */
.img-stage {
  flex: 1;
  min-width: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: zoom-in;
}

.img-stage.enlarged { cursor: zoom-out; }

.img-stage img {
  max-width: 100%;
  max-height: 78vh;
  object-fit: contain;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  transition: opacity 0.25s ease, max-height 0.3s ease;
}

.img-stage .img-back {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

.img-stage.enlarged img { max-height: none; }

.img-stage video {
  max-width: 100%;
  max-height: 78vh;
  object-fit: contain;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
}

/* Meta under expanded image */
.meta-expanded {
  font-size: 16px;
  font-weight: 300;
  color: #666;
  letter-spacing: 0.02em;
  margin-top: 20px;
  text-align: center;
  font-family: 'DM Mono', monospace;
}

/* Detail block under expanded — title, description, link */
.detail-block {
  margin-top: 24px;
  text-align: center;
  max-width: 560px;
}

.detail-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 400;
  color: #222;
  margin-bottom: 8px;
}

.detail-description {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 300;
  color: #777;
  line-height: 1.6;
  margin-bottom: 12px;
}

.detail-link {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: #999;
  text-decoration: none;
  transition: color 0.2s;
}
.detail-link:hover { color: #333; }

/* Expanded text block */
.expanded-text {
  width: 100vw;
  margin-left: -40px;
  margin-top: 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 80px;
  min-height: 60vh;
  opacity: 0;
  animation: expandIn 0.35s ease forwards;
  position: relative;
}

.expanded-text .close-btn {
  position: absolute;
  top: 24px;
  right: 36px;
}

.expanded-text .text-content-large {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  line-height: 1.7;
  color: #222;
  max-width: 600px;
  white-space: pre-line;
}

@keyframes expandIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Share button */
.share-btn {
  background: none;
  border: none;
  color: #bbb;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: 8px;
  vertical-align: middle;
  transition: color 0.2s;
  position: relative;
}

.share-btn:hover { color: #555; }
.share-btn.copied { color: #000; }

.share-btn.copied::after {
  content: 'Copied';
  position: absolute;
  bottom: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  font-family: 'DM Mono', monospace;
  color: #666;
  white-space: nowrap;
}

/* Footer */
.site-footer { padding: 80px 40px 40px; }
.site-footer span { font-size: 16px; font-weight: 300; color: #888; letter-spacing: 0.03em; font-family: 'DM Mono', monospace; }
.site-footer a { color: #666; text-decoration: none; transition: color 0.2s; }
.site-footer a:hover { color: #000; }
.footer-email { margin-top: 16px; }
.footer-social {
  margin-top: 16px;
  display: flex;
  gap: 20px;
}
.footer-social a {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: #999;
  text-decoration: none;
  transition: color 0.2s;
}
.footer-social a:hover { color: #333; }
.footer-copy { margin-top: 40px; }
.footer-notice { color: #aaa; margin-top: 6px; display: inline-block; }

/* Breakpoints: 6 → 5 → 4 → 3 → 2 → 1 */
@media (min-width: 2200px) { .grid-section { grid-template-columns: repeat(6, 1fr); gap: 16px; } }
@media (min-width: 1800px) and (max-width: 2199px) { .grid-section { grid-template-columns: repeat(5, 1fr); gap: 18px; } }
@media (min-width: 1400px) and (max-width: 1799px) { .grid-section { grid-template-columns: repeat(4, 1fr); gap: 18px; } }
@media (max-width: 1399px) and (min-width: 1101px) { .grid-section { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

@media (max-width: 1100px) {
  .grid-section { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .flow { padding: 0 20px 20px; }
  .site-header { padding: 24px 20px 0; min-height: 160px; }
  .grid-item { cursor: default; }
  .grid-item:hover img { opacity: 1; }
  .grid-item.text-block { cursor: default; }
  .site-footer { padding: 60px 20px 40px; }
  .expanded-photo { padding: 40px 20px; margin-left: -20px; }
  .expanded-text { padding: 60px 20px; margin-left: -20px; }
}

@media (max-width: 640px) {
  .grid-section { grid-template-columns: 1fr; gap: 12px; }
  .flow { padding: 0 16px 16px; }
  .site-header { padding: 24px 16px 0; flex-direction: column; gap: 4px; min-height: 120px; }
  .site-footer { padding: 48px 16px 32px; }
  .grid-item.text-block { padding: 20px 16px; min-height: 100px; }
  .grid-item.text-block .text-content { font-size: 15px; }
}

/* Animation — only on initial load */
.grid-item.entering {
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp 0.45s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Copy protection */
img, video {
  -webkit-user-drag: none;
  user-select: none;
}

/* === Video blocks === */
.grid-item.video-block video {
  width: 100%;
  display: block;
  pointer-events: none;
}
.grid-item.video-block:hover video { opacity: 0.85; transition: opacity 0.3s ease; }

/* === Audio blocks === */
.grid-item .audio-player {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  min-height: 160px;
  padding: 28px 24px;
  cursor: pointer;
}

.audio-btn {
  font-size: 28px;
  color: #999;
  transition: color 0.2s;
  user-select: none;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  border-radius: 50%;
}
.audio-btn:hover { color: #333; border-color: #999; }
.audio-btn.playing { color: #333; border-color: #333; }

.audio-label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: #aaa;
  margin-top: 12px;
  text-align: center;
}

/* === Mobile detail under images === */
.mobile-detail {
  padding: 8px 0 20px;
}

.mobile-detail-row {
  display: flex;
  justify-content: flex-end;
  align-items: baseline;
  gap: 12px;
}

.mobile-detail-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: #333;
  margin-right: auto;
}

.mobile-detail-desc {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  color: #888;
  line-height: 1.5;
  margin-top: 4px;
  margin-bottom: 6px;
}

.mobile-detail-link {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: #999;
  text-decoration: none;
  transition: color 0.2s;
}
.mobile-detail-link:hover { color: #333; }

.mobile-share-btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #bbb;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.mobile-share-btn:hover { color: #666; }

@media (min-width: 1101px) {
  .mobile-detail { display: none; }
}

</style>
</head>

    "thumb": "photos/thumb/faces-marker (34).jpg",
    "full": "photos/full/faces-marker (34).jpg"
  },
  {
    "type": "image",
    "id": "2f-4319",
    "thumb": "photos/thumb/IMG_4319.jpg",
    "full": "photos/full/IMG_4319.jpg"
  }
];
const flow = document.getElementById('flow');
let expandedId = null;
let isEnlarged = false;
const preloadCache = {};

// DOM references
let gridBefore = null;   // grid-section with items before expanded
let gridAfter = null;    // grid-section with items after expanded
let expandedEl = null;   // the expanded view element
let allGridItems = [];   // all grid-item DOM elements, built once
let lastClickedGridItem = null;

function getIdx() {
  return items.findIndex(i => i.id === expandedId);
}

function preloadImage(src) {
  if (preloadCache[src]) return preloadCache[src];
  const promise = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(src);
    img.onerror = () => resolve(src);
    img.src = src;
  });
  preloadCache[src] = promise;
  return promise;
}

function preloadNeighbors(idx) {
  [-1, 1].forEach(d => {
    const n = items[idx + d];
    if (n && n.type === 'image') preloadImage(n.full);
  });
}

function isDesktop() {
  return window.innerWidth > 1100;
}

// === Build all grid items once ===

function init() {
  allGridItems = items.map((item, i) => {
    const div = document.createElement('div');
    div.className = 'grid-item entering' + (item.type === 'text' ? ' text-block' : '') + (item.type === 'video' ? ' video-block' : '');
    div.dataset.itemId = item.id;
    div.dataset.itemIndex = i;
    div.style.animationDelay = `${i * 0.035}s`;

    // Remove entering class after animation so re-parenting doesn't re-trigger it
    div.addEventListener('animationend', () => {
      div.classList.remove('entering');
      div.style.animationDelay = '';
    }, { once: true });

    if (item.type === 'video') {
      const src = item.full || item.thumb;
      div.innerHTML = `<video src="${src}" autoplay muted loop playsinline preload="metadata"></video>`;
      if (isDesktop()) {
        div.addEventListener('click', () => openFromGrid(item.id));
      }
      if (!isDesktop()) {
        div.innerHTML += hasDetail(item) ? buildMobileDetail(item) : buildMobileShare(item);
      }
    } else if (item.type === 'audio') {
      div.innerHTML = buildAudioBlock(item);
    } else if (item.type === 'image') {
      const src = isDesktop() ? item.thumb : item.full;
      div.innerHTML = `<img src="${src}" alt="${item.id}" loading="lazy">`;
      if (isDesktop()) {
        div.addEventListener('click', () => openFromGrid(item.id));
      }
      if (!isDesktop()) {
        div.innerHTML += hasDetail(item) ? buildMobileDetail(item) : buildMobileShare(item);
      }
    } else {
      div.innerHTML = `<div class="text-content">${item.text}</div>`;
      if (isDesktop()) {
        div.style.cursor = 'pointer';
        div.addEventListener('click', () => openFromGrid(item.id));
      }
    }

    return div;
  });

  renderFlat();
}

function buildMobileDetail(item) {
  let html = '<div class="mobile-detail">';
  // Title row with share button on the right
  html += '<div class="mobile-detail-row">';
  if (item.title) {
    html += `<span class="mobile-detail-title">${item.title}</span>`;
  }
  html += `<button class="mobile-share-btn" data-id="${item.id}">share</button>`;
  html += '</div>';
  if (item.description) html += `<div class="mobile-detail-desc">${item.description}</div>`;
  if (item.link) html += `<a class="mobile-detail-link" href="${item.link}" target="_blank">${item.link_text || 'View on kremenskii.art'} →</a>`;
  html += '</div>';
  return html;
}

// Share-only row for images without JSON metadata
function buildMobileShare(item) {
  return `<div class="mobile-detail"><div class="mobile-detail-row"><button class="mobile-share-btn" data-id="${item.id}">share</button></div></div>`;
}

function buildAudioBlock(item) {
  const label = item.title || '';
  return `
    <div class="audio-player" data-src="${item.full}">
      <div class="audio-btn">▶</div>
      ${label ? `<div class="audio-label">${label}</div>` : ''}
    </div>`;
}

// === Render: flat grid (no expanded) ===

// === Video autoplay: only when visible in viewport ===

const videoObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target;
    if (entry.isIntersecting) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, { threshold: 0.25 });

function observeVideos() {
  flow.querySelectorAll('.grid-item video').forEach(v => {
    videoObserver.observe(v);
  });
}

function renderFlat() {
  flow.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'grid-section';
  allGridItems.forEach(el => grid.appendChild(el));
  flow.appendChild(grid);
  gridBefore = grid;
  gridAfter = null;
  observeVideos();
}

// === Render: split grid around expanded item ===

function renderSplit(itemIndex) {
  flow.innerHTML = '';

  // Grid before
  gridBefore = document.createElement('div');
  gridBefore.className = 'grid-section';
  for (let i = 0; i < itemIndex; i++) {
    gridBefore.appendChild(allGridItems[i]);
  }
  flow.appendChild(gridBefore);

  // Expanded element (already created)
  if (expandedEl) {
    flow.appendChild(expandedEl);
  }

  // Grid after
  gridAfter = document.createElement('div');
  gridAfter.className = 'grid-section';
  for (let i = itemIndex + 1; i < allGridItems.length; i++) {
    gridAfter.appendChild(allGridItems[i]);
  }
  flow.appendChild(gridAfter);
  observeVideos();
}

// === Open / Close ===

function openFromGrid(id) {
  if (expandedEl) {
    removeExpanded();
  }

  expandedId = id;
  isEnlarged = false;
  history.replaceState(null, '', '#' + id);

  const idx = getIdx();
  const item = items[idx];
  if (!item) return;

  lastClickedGridItem = allGridItems[idx];

  if (item.type === 'image' || item.type === 'video') {
    expandedEl = createExpandedImage(item);
  } else if (item.type === 'text') {
    expandedEl = createExpandedText(item);
  } else {
    // audio or unknown — don't expand
    return;
  }

  renderSplit(idx);

  requestAnimationFrame(() => {
    if (expandedEl) expandedEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  if (item.type === 'image') preloadNeighbors(idx);
}

function removeExpanded() {
  if (expandedEl) {
    expandedEl.remove();
    expandedEl = null;
  }
}

function closeExpanded() {
  const scrollTarget = lastClickedGridItem;
  removeExpanded();
  expandedId = null;
  isEnlarged = false;
  lastClickedGridItem = null;
  history.replaceState(null, '', window.location.pathname);

  renderFlat();

  if (scrollTarget) {
    requestAnimationFrame(() => {
      scrollTarget.scrollIntoView({ behavior: 'instant', block: 'center' });
    });
  }
}

// === Share button ===

function shareButtonHtml() {
  return `
    <button class="share-btn" title="Copy link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </button>`;
}

function bindShareBtn(container, id) {
  const btn = container.querySelector('.share-btn');
  if (!btn) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const url = window.location.origin + window.location.pathname + '#' + id;
    navigator.clipboard.writeText(url).then(() => {
      btn.classList.add('copied');
      btn.setAttribute('title', 'Copied!');
      setTimeout(() => { btn.classList.remove('copied'); btn.setAttribute('title', 'Copy link'); }, 2000);
    });
  });
}

// === Detail metadata ===

function hasDetail(item) {
  return item.title || item.description || item.link;
}

function buildDetailHtml(item) {
  if (!hasDetail(item)) return '';
  let html = '';
  if (item.title) html += `<div class="detail-title">${item.title}</div>`;
  if (item.description) html += `<div class="detail-description">${item.description}</div>`;
  if (item.link) html += `<a class="detail-link" href="${item.link}" target="_blank">${item.link_text || 'View on kremenskii.art'} →</a>`;
  return html;
}

// === Create expanded elements ===

function createExpandedImage(item) {
  const idx = getIdx();
  const hasPrev = idx > 0;
  const hasNext = idx < items.length - 1;
  const el = document.createElement('div');
  el.className = 'expanded-photo';
  el.id = item.id;
  const isVideo = item.type === 'video';

  let metaHtml = (item.meta || '') + shareButtonHtml();
  let detailHtml = hasDetail(item)
    ? `<div class="detail-block">${buildDetailHtml(item)}</div>`
    : '<div class="detail-block" style="display:none"></div>';

  let mediaHtml;
  if (isVideo) {
    mediaHtml = `
      <video id="media-front" src="${item.full}" autoplay muted loop playsinline></video>`;
  } else {
    mediaHtml = `
      <img id="img-front" src="${item.full}" alt="${item.id}">
      <img id="img-back" class="img-back" src="" alt="">`;
  }

  el.innerHTML = `
    <button class="close-btn" title="Close">&times;</button>
    <div class="viewer-row">
      <button class="nav-arrow" ${!hasPrev ? 'disabled' : ''} data-dir="prev">&#8592;</button>
      <div class="img-stage" id="img-stage">
        ${mediaHtml}
      </div>
      <button class="nav-arrow" ${!hasNext ? 'disabled' : ''} data-dir="next">&#8594;</button>
    </div>
    <div class="meta-expanded">${metaHtml}</div>
    ${detailHtml}
  `;

  el.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation(); closeExpanded(); });
  bindShareBtn(el.querySelector('.meta-expanded'), item.id);

  const stage = el.querySelector('#img-stage');
  if (!isVideo) {
    stage.addEventListener('click', (e) => {
      e.stopPropagation();
      isEnlarged = !isEnlarged;
      stage.classList.toggle('enlarged', isEnlarged);
    });
  }

  rebindArrows(el, idx);
  return el;
}

function createExpandedText(item) {
  const idx = getIdx();
  const hasPrev = idx > 0;
  const hasNext = idx < items.length - 1;
  const el = document.createElement('div');
  el.className = 'expanded-text';
  el.id = item.id;
  el.innerHTML = `
    <button class="close-btn" title="Close">&times;</button>
    <div class="viewer-row">
      <button class="nav-arrow" ${!hasPrev ? 'disabled' : ''} data-dir="prev">&#8592;</button>
      <div class="text-content-large">${item.text}</div>
      <button class="nav-arrow" ${!hasNext ? 'disabled' : ''} data-dir="next">&#8594;</button>
    </div>
  `;
  el.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation(); closeExpanded(); });
  rebindArrows(el, idx);
  return el;
}

// === Arrow navigation ===

function navigateArrow(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  // Skip audio items when navigating
  if (item.type === 'audio') return;

  expandedId = id;
  isEnlarged = false;
  history.replaceState(null, '', '#' + id);

  const idx = getIdx();
  const currentIsMedia = expandedEl && expandedEl.classList.contains('expanded-photo');
  const nextIsMedia = item.type === 'image' || item.type === 'video';
  const nextIsText = item.type === 'text';

  // If type changes, or going to/from video, replace expanded element
  const currentHasImgFront = expandedEl && expandedEl.querySelector('#img-front');
  const nextIsImage = item.type === 'image';
  const canCrossfade = currentIsMedia && nextIsImage && currentHasImgFront;

  if (!canCrossfade) {
    const oldEl = expandedEl;
    if (nextIsMedia) {
      expandedEl = createExpandedImage(item);
    } else if (nextIsText) {
      expandedEl = createExpandedText(item);
    } else {
      return;
    }
    if (oldEl) {
      oldEl.replaceWith(expandedEl);
    }
    requestAnimationFrame(() => {
      expandedEl.scrollIntoView({ behavior: 'instant', block: 'start' });
    });
    if (nextIsImage) preloadNeighbors(idx);
    return;
  }

  // Image-to-image: crossfade in place
  const stage = expandedEl.querySelector('.img-stage');
  const imgFront = expandedEl.querySelector('#img-front');
  const imgBack = expandedEl.querySelector('#img-back');

  if (!imgFront || !imgBack || !stage) return;

  stage.classList.remove('enlarged');
  preloadImage(item.full).then(() => {
    imgBack.src = item.full;
    imgBack.style.opacity = '1';
    imgFront.style.opacity = '0';
    setTimeout(() => {
      imgFront.src = item.full;
      imgFront.style.opacity = '1';
      imgBack.style.opacity = '0';

      expandedEl.id = item.id;

      const meta = expandedEl.querySelector('.meta-expanded');
      if (meta) {
        meta.innerHTML = (item.meta || '') + shareButtonHtml();
        bindShareBtn(meta, item.id);
      }

      const detailBlock = expandedEl.querySelector('.detail-block');
      if (detailBlock) {
        detailBlock.innerHTML = buildDetailHtml(item);
        detailBlock.style.display = hasDetail(item) ? 'block' : 'none';
      }

      rebindArrows(expandedEl, idx);
      preloadNeighbors(idx);
    }, 260);
  });
}

function rebindArrows(container, idx) {
  const prevBtn = container.querySelector('.nav-arrow[data-dir="prev"]');
  const nextBtn = container.querySelector('.nav-arrow[data-dir="next"]');
  if (prevBtn) {
    const n = prevBtn.cloneNode(true);
    prevBtn.replaceWith(n);
    n.disabled = idx <= 0;
    if (idx > 0) n.addEventListener('click', (e) => { e.stopPropagation(); navigateArrow(items[idx - 1].id); });
  }
  if (nextBtn) {
    const n = nextBtn.cloneNode(true);
    nextBtn.replaceWith(n);
    n.disabled = idx >= items.length - 1;
    if (idx < items.length - 1) n.addEventListener('click', (e) => { e.stopPropagation(); navigateArrow(items[idx + 1].id); });
  }
}

// === Keyboard ===

document.addEventListener('keydown', (e) => {
  if (!expandedId) return;
  const idx = getIdx();
  if (e.key === 'Escape') {
    if (isEnlarged) { isEnlarged = false; const s = document.getElementById('img-stage'); if (s) s.classList.remove('enlarged'); }
    else { closeExpanded(); }
  } else if (e.key === 'ArrowLeft' && idx > 0) { navigateArrow(items[idx - 1].id); }
  else if (e.key === 'ArrowRight' && idx < items.length - 1) { navigateArrow(items[idx + 1].id); }
});

// === Init ===

init();

// Hash navigation on load
const hash = window.location.hash.slice(1);
if (hash && isDesktop()) {
  const idx = items.findIndex(i => i.id === hash);
  if (idx !== -1) {
    const item = items[idx];
    expandedId = item.id;
    lastClickedGridItem = allGridItems[idx];
    expandedEl = (item.type === 'image' || item.type === 'video') ? createExpandedImage(item) : createExpandedText(item);
    renderSplit(idx);
    requestAnimationFrame(() => {
      if (expandedEl) expandedEl.scrollIntoView({ block: 'start' });
    });
  }
}

// Copy protection
document.addEventListener('contextmenu', (e) => {
  if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') e.preventDefault();
});
document.addEventListener('dragstart', (e) => {
  if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') e.preventDefault();
});

// Mobile share buttons (event delegation)
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.mobile-share-btn');
  if (!btn) return;
  e.stopPropagation();
  const id = btn.dataset.id;
  const url = window.location.origin + window.location.pathname + '#' + id;
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'copy link'; }, 2000);
  });
});

// Audio player (event delegation)
let currentAudio = null;
let currentAudioBtn = null;
document.addEventListener('click', (e) => {
  const player = e.target.closest('.audio-player');
  if (!player) return;
  const src = player.dataset.src;
  const btn = player.querySelector('.audio-btn');
  if (!src || !btn) return;

  if (currentAudio && currentAudioBtn === btn) {
    // Toggle off
    currentAudio.pause();
    currentAudio = null;
    currentAudioBtn = null;
    btn.textContent = '▶';
    btn.classList.remove('playing');
    return;
  }

  // Stop previous
  if (currentAudio) {
    currentAudio.pause();
    if (currentAudioBtn) {
      currentAudioBtn.textContent = '▶';
      currentAudioBtn.classList.remove('playing');
    }
  }

  const audio = new Audio(src);
  audio.play();
  btn.textContent = '■';
  btn.classList.add('playing');
  currentAudio = audio;
  currentAudioBtn = btn;

  audio.addEventListener('ended', () => {
    btn.textContent = '▶';
    btn.classList.remove('playing');
    currentAudio = null;
    currentAudioBtn = null;
  });
});

// === Scroll position persistence ===
const SCROLL_KEY = 'fragments_scroll_pos';

// Restore scroll position on load (only if no hash navigation)
if (!hash) {
  try {
    const saved = localStorage.getItem(SCROLL_KEY);
    if (saved) {
      const pos = parseInt(saved, 10);
      // Wait for images to start loading, then restore
      requestAnimationFrame(() => {
        setTimeout(() => { window.scrollTo(0, pos); }, 100);
      });
    }
  } catch (e) {}
}

// Save scroll position periodically
let scrollTimer = null;
window.addEventListener('scroll', () => {
  if (scrollTimer) clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    try {
      localStorage.setItem(SCROLL_KEY, String(window.scrollY));
    } catch (e) {}
  }, 200);
}, { passive: true });

</script>
</body>
</html>
